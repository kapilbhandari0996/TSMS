<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSMS | AI Monitoring & Detection</title>
  <link rel="stylesheet" href="styles.css">
  <script src="ai-dashboard.js" defer></script>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="logo" style="cursor: pointer;" onclick="window.location.href='/'">
        <div class="logo-icon">🛡️</div>
        <span>TSMS | AI Detection</span>
      </div>
      
      <div class="header-controls">
        <button id="logout-btn" class="btn-secondary" style="padding: 6px 14px; font-size: 12px; border-color: var(--danger); color: var(--danger);" title="Log Out">
          🚪 Logout
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="page-section active">
      <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
        <div>
          <h2>AI-Driven Anomaly Detection</h2>
          <p style="color: var(--text-secondary); font-size: 14px; margin-top: 4px;">Monitor potential distress situations generated by the AI Engine.</p>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="admin-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 24px;">
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(239,68,68,0.1); color: var(--danger);">🚨</div>
          <div class="stat-content">
            <h3 id="stat-active-alerts">0</h3>
            <p>Active Alerts</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(34,197,94,0.1); color: var(--safe);">✅</div>
          <div class="stat-content">
            <h3 id="stat-resolved-alerts">0</h3>
            <p>Resolved Alerts</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(59,130,246,0.1); color: var(--accent);">📊</div>
          <div class="stat-content">
            <h3 id="stat-total-alerts">0</h3>
            <p>Total Alerts</p>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div style="background: var(--bg-secondary); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Risk Level</label>
          <select id="filter-risk" class="form-input" style="padding: 6px 12px; font-size: 13px;">
            <option value="All">All Levels</option>
            <option value="Critical">Critical</option>
            <option value="High Risk">High Risk</option>
            <option value="Medium Risk">Medium Risk</option>
            <option value="Low Risk">Low Risk</option>
          </select>
        </div>
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Status</label>
          <select id="filter-status" class="form-input" style="padding: 6px 12px; font-size: 13px;">
            <option value="All">All Statuses</option>
            <option value="Active">Active</option>
            <option value="Under Review">Under Review</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Tourist Name / ID</label>
          <input type="text" id="filter-search" class="form-input" placeholder="Search..." style="padding: 6px 12px; font-size: 13px; width: 200px;">
        </div>
        <button id="btn-refresh" class="btn-primary" style="margin-left: auto; padding: 8px 16px;">🔄 Refresh</button>
      </div>

      <!-- Alerts Table -->
      <div class="table-container" style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden;">
        <table class="data-table" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: rgba(255,255,255,0.02); text-align: left; border-bottom: 1px solid var(--border-color);">
              <th style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Alert ID</th>
              <th style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Time</th>
              <th style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Tourist</th>
              <th style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Risk Level</th>
              <th style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Detection Reason</th>
              <th style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Status</th>
              <th style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Actions</th>
            </tr>
          </thead>
          <tbody id="alerts-tbody">
            <!-- Dynamically populated -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Resolve Modal -->
  <div id="resolve-modal" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 24px; border-radius: 12px; width: 90%; max-width: 400px;">
      <h3 style="margin-top: 0; margin-bottom: 16px;">Resolve AI Alert</h3>
      <div class="form-group" style="margin-bottom: 16px;">
        <label>Remarks</label>
        <textarea id="resolve-remarks" class="form-input" style="width: 100%; min-height: 80px;" placeholder="Add resolution notes..."></textarea>
      </div>
      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button id="btn-cancel-resolve" class="btn-secondary">Cancel</button>
        <button id="btn-confirm-resolve" class="btn-primary" style="background: var(--safe); border-color: var(--safe);">Confirm Resolve</button>
      </div>
    </div>
  </div>

</body>
</html>
